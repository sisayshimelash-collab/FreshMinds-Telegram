<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>FreshMinds Note</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="style.css" />
  <style>
    * { -webkit-user-select: none !important; user-select: none !important; }
    body { background: #000000; color: #f0f0f0; overscroll-behavior-y: contain; padding: 0; overflow-x: hidden; position: relative; }
    
    /* DIAGONAL WATERMARK */
    body::before {
      content: 'prepared by FreshMinds Exam Class';
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) rotate(-45deg);
      font-size: 3rem;
      font-family: var(--font-head);
      font-weight: 700;
      color: rgba(212, 255, 78, 0.08);
      white-space: nowrap;
      pointer-events: none;
      z-index: 1;
      letter-spacing: 2px;
      width: 200%;
      text-align: center;
    }
    
    #loading-screen { position: fixed; inset: 0; background: #000; display: grid; place-items: center; z-index: 100; transition: opacity 0.3s ease; }
    #loading-screen.hidden { opacity: 0; pointer-events: none; }
    .loader-inner { text-align: center; }
    .loader-logo { width: 48px; height: 48px; background: var(--accent); border-radius: 12px; margin: 0 auto 20px; display: grid; place-items: center; animation: pulse 1.4s ease-in-out infinite; }
    @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(.9); opacity: .7; } }
    .loader-text { font-family: var(--font-head); font-size: 0.75rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text-muted); }
    #error-screen { display: none; position: fixed; inset: 0; background: #000; place-items: center; padding: 40px; text-align: center; }
    #error-screen.show { display: grid; }
    .error-emoji { font-size: 3rem; margin-bottom: 16px; }
    .error-title { font-family: var(--font-head); font-size: 1.2rem; font-weight: 700; margin-bottom: 8px; }
    .error-msg { color: var(--text-muted); font-size: 0.82rem; }
    #note-wrapper { display: none; min-height: 100dvh; padding-bottom: env(safe-area-inset-bottom, 24px); position: relative; z-index: 2; }
    #note-wrapper.show { display: block; }
    .top-bar { position: sticky; top: 0; background: rgba(0,0,0,.95); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-bottom: 1px solid #1c1c1c; padding: 14px 20px; display: flex; align-items: center; gap: 12px; z-index: 10; }
    .top-bar-brand { display: flex; align-items: center; gap: 8px; }
    .brand-dot { width: 8px; height: 8px; background: var(--accent); border-radius: 50%; flex-shrink: 0; }
    .brand-name { font-family: var(--font-head); font-size: 0.78rem; font-weight: 700; letter-spacing: 0.03em; color: #888; }
    .premium-tag { margin-left: auto; font-size: 0.6rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent); border: 1px solid rgba(212,255,78,.25); padding: 3px 8px; border-radius: 99px; }
    .scroll-hint { text-align: center; padding: 10px 0 2px; color: #333; font-size: 0.65rem; letter-spacing: 0.08em; text-transform: uppercase; }
    .note-body { padding: 28px 22px 60px; max-width: 640px; margin: 0 auto; }
    .note-meta { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
    .note-date { font-size: 0.68rem; color: #444; letter-spacing: 0.05em; }
    .note-divider { flex: 1; height: 1px; background: #1c1c1c; }
    .watermark-banner { margin-bottom: 20px; padding: 10px; background: rgba(212,255,78,.05); border-left: 2px solid var(--accent); font-size: 0.75rem; color: var(--accent); letter-spacing: 0.05em; }
    #note-title { font-family: var(--font-head); font-size: clamp(1.4rem, 5vw, 2rem); font-weight: 800; line-height: 1.15; letter-spacing: -0.03em; margin-bottom: 28px; color: #ffffff; }
    #note-title::after { content: ''; display: block; width: 40px; height: 3px; background: var(--accent); border-radius: 2px; margin-top: 14px; }
    #note-content { font-family: var(--font-body); font-size: 0.92rem; line-height: 1.85; color: #cccccc; white-space: pre-wrap; word-break: break-word; }
    #note-content strong { color: #ffffff; font-weight: 500; }
    #note-content em { color: #aaaaaa; font-style: italic; }
    #note-content .heading-1 { font-family: var(--font-head); font-size: 1.25rem; font-weight: 700; color: #ffffff; margin: 28px 0 10px; letter-spacing: -0.02em; }
    #note-content .heading-2 { font-family: var(--font-head); font-size: 1rem; font-weight: 600; color: #dddddd; margin: 22px 0 8px; }
    #note-content .code-block { background: #111; border: 1px solid #222; border-radius: 6px; padding: 14px 16px; font-size: 0.82rem; color: var(--accent); overflow-x: auto; margin: 16px 0; white-space: pre; }
    #note-content .inline-code { background: #161616; border: 1px solid #252525; border-radius: 4px; padding: 1px 6px; font-size: 0.84em; color: var(--accent); }
    #note-content .blockquote { border-left: 3px solid var(--accent); padding: 4px 0 4px 16px; margin: 16px 0; color: #888; font-style: italic; }
    #note-content .hr { border: none; border-top: 1px solid #1c1c1c; margin: 24px 0; }
    
    /* CTA SECTION */
    .cta-section {
      margin-top: 60px;
      padding: 40px 20px;
      background: linear-gradient(135deg, rgba(212,255,78,.08) 0%, rgba(212,255,78,.03) 100%);
      border: 1px solid rgba(212,255,78,.15);
      border-radius: 8px;
      text-align: center;
    }
    .cta-emoji { font-size: 2.5rem; margin-bottom: 16px; }
    .cta-title { font-family: var(--font-head); font-size: 1.1rem; font-weight: 700; margin-bottom: 8px; color: var(--accent); }
    .cta-text { font-size: 0.85rem; color: #aaa; margin-bottom: 16px; line-height: 1.6; }
    .cta-button { display: inline-block; padding: 12px 24px; background: var(--accent); color: #000; text-decoration: none; border-radius: 6px; font-family: var(--font-head); font-weight: 700; font-size: 0.85rem; transition: opacity 0.2s; }
    .cta-button:hover { opacity: 0.8; }
    
    .bottom-fade { position: fixed; bottom: 0; left: 0; right: 0; height: 80px; background: linear-gradient(transparent, #000); pointer-events: none; z-index: 1; }
    body { -webkit-touch-callout: none; }
  </style>
</head>
<body>

<div id="loading-screen">
  <div class="loader-inner">
    <div class="loader-logo">
      <svg width="24" height="24" viewBox="0 0 20 20" fill="#0a0a0a"><path d="M10 2L3 7v11h5v-5h4v5h5V7L10 2z"/></svg>
    </div>
    <div class="loader-text">Loading note…</div>
  </div>
</div>

<div id="error-screen">
  <div>
    <div class="error-emoji">📭</div>
    <div class="error-title">Note Not Found</div>
    <div class="error-msg" id="error-msg">This note could not be loaded.</div>
  </div>
</div>

<div id="note-wrapper">
  <div class="top-bar">
    <div class="top-bar-brand">
      <div class="brand-dot"></div>
      <span class="brand-name">FreshMinds Academy</span>
    </div>
    <span class="premium-tag">Premium</span>
  </div>
  
  <div class="scroll-hint">↕ scroll to read</div>

  <div class="note-body">
    <div class="note-meta">
      <span class="note-date" id="note-date">—</span>
      <div class="note-divider"></div>
    </div>

    <div class="watermark-banner">
      📌 <span id="watermark">Loading...</span>
    </div>

    <h1 id="note-title"></h1>
    <div id="note-content"></div>
    
    <!-- CALL TO ACTION -->
    <div class="cta-section">
      <div class="cta-emoji">🎓</div>
      <div class="cta-title">Join FreshMinds Exam Class</div>
      <div class="cta-text">Get access to premium study materials, exclusive practice tests, and expert guidance to excel in your exams.</div>
      <a href="https://t.me/freshexams_bot" class="cta-button" target="_blank">Join Now →</a>
    </div>
  </div>
</div>

<div class="bottom-fade"></div>

<script>
  const tg = window.Telegram?.WebApp;
  
  if (tg) {
    tg.ready();
    tg.setHeaderColor("#000000");
    tg.setBackgroundColor("#000000");
    tg.enableClosingConfirmation && tg.enableClosingConfirmation();
  }

  const user = tg?.initDataUnsafe?.user;
  const studentId = user ? `${user.first_name} ${user.last_name || ''}`.trim() : "Student";
  const userId = user?.id || null;

  document.addEventListener("contextmenu", e => e.preventDefault());
  document.addEventListener("selectstart", e => e.preventDefault());

  const params = new URLSearchParams(window.location.search);
  const noteId = params.get("note");

  function renderContent(raw) {
    let s = raw.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    s = s.replace(/```([\s\S]*?)```/g, (_, code) => `<div class="code-block">${code.trim()}</div>`);
    s = s.replace(/`([^`]+)`/g, '<span class="inline-code">$1</span>');
    s = s.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
    s = s.replace(/\*(.+?)\*/g, "<em>$1</em>");
    s = s.replace(/^### (.+)$/gm, '<div class="heading-2">$1</div>');
    s = s.replace(/^## (.+)$/gm, '<div class="heading-1">$1</div>');
    s = s.replace(/^# (.+)$/gm, '<div class="heading-1">$1</div>');
    s = s.replace(/^&gt; (.+)$/gm, '<div class="blockquote">$1</div>');
    s = s.replace(/^---$/gm, '<div class="hr"></div>');
    return s;
  }

  async function loadNote() {
    if (!noteId) return showError("No note ID provided in the URL.");
    try {
      const res = await fetch(`/api/note/${encodeURIComponent(noteId)}`);
      if (!res.ok) throw new Error(res.status === 404 ? "Note not found." : "Server error.");
      const note = await res.json();

      document.getElementById("note-title").textContent = note.title;
      document.getElementById("note-content").innerHTML = renderContent(note.content);
      document.getElementById("note-date").textContent = formatDate(note.createdAt);
      document.getElementById("watermark").textContent = `Viewed by: ${studentId}`;
      
      document.title = note.title;
      hideLoading();
      document.getElementById("note-wrapper").classList.add("show");
      
      if (userId) {
        logAccess(noteId, studentId, userId);
      }
    } catch (err) {
      showError(err.message);
    }
  }

  function hideLoading() {
    const screen = document.getElementById("loading-screen");
    screen.classList.add("hidden");
    setTimeout(() => screen.remove(), 350);
  }

  function showError(msg) {
    hideLoading();
    document.getElementById("error-msg").textContent = msg;
    document.getElementById("error-screen").classList.add("show");
  }

  function formatDate(iso) {
    if (!iso) return "";
    return new Date(iso).toLocaleDateString("en-GB", { day: "numeric", month: "long", year: "numeric" });
  }

  async function logAccess(noteId, studentName, userId) {
    try {
      await fetch("/api/log-access", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ noteId, studentName, userId, accessedAt: new Date().toISOString() })
      });
    } catch (err) {
      console.log("Access log skipped:", err.message);
    }
  }

  loadNote();
</script>
</body>
</html>
